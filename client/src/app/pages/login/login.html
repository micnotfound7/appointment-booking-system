<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-10 sm:py-16">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">

      <!-- Top Banner -->
      <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-8 sm:py-10 text-center">
        <div class="text-5xl sm:text-6xl mb-3">🏥</div>
        <h2 class="text-xl sm:text-2xl font-bold text-white">Welcome Back</h2>
        <p class="text-blue-200 text-xs sm:text-sm mt-1">Sign in to your BookEase account</p>
      </div>

      <!-- Form -->
      <div class="px-5 sm:px-8 py-6 sm:py-8">

        <div *ngIf="error"
             class="bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-lg mb-5 text-xs sm:text-sm flex items-start gap-2">
          <span class="mt-0.5">⚠️</span>
          <span>{{ error }}</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4 sm:space-y-5">

          <div>
            <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1.5">
              Email Address
            </label>
            <input formControlName="email" type="email"
                   placeholder="you@example.com"
                   class="w-full border-2 border-gray-200 text-gray-900 placeholder-gray-400 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 text-sm focus:outline-none focus:border-blue-600 transition">
            <p *ngIf="f['email'].touched && f['email'].invalid"
               class="text-red-500 text-xs mt-1.5 font-medium">
              Valid email is required
            </p>
          </div>

          <div>
            <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1.5">
              Password
            </label>
            <input formControlName="password" type="password"
                   placeholder="••••••••"
                   class="w-full border-2 border-gray-200 text-gray-900 placeholder-gray-400 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 text-sm focus:outline-none focus:border-blue-600 transition">
            <p *ngIf="f['password'].touched && f['password'].invalid"
               class="text-red-500 text-xs mt-1.5 font-medium">
              Password required (min 6 chars)
            </p>
          </div>

          <button type="submit" [disabled]="loading"
                  class="w-full bg-blue-600 text-white py-3 sm:py-3.5 rounded-lg font-bold hover:bg-blue-700 active:bg-blue-800 transition disabled:opacity-50 disabled:cursor-not-allowed text-sm sm:text-base mt-2">
            {{ loading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>

        <p class="text-center text-xs sm:text-sm text-gray-500 mt-5 sm:mt-6">
          No account?
          <a routerLink="/register" class="text-blue-600 font-semibold hover:text-blue-700">
            Register here
          </a>
        </p>
      </div>
    </div>

    <!-- Footer note -->
    
  </div>
</div>
