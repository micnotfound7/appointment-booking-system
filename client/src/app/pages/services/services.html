<div class="min-h-screen bg-white">

  <!-- Page Header -->
  <div class="bg-gradient-to-r from-gray-900 to-gray-800 text-white py-10 sm:py-14 lg:py-16 px-4">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-2xl sm:text-3xl lg:text-5xl font-bold mb-2 sm:mb-3">Our Services</h1>
      <p class="text-gray-300 text-sm sm:text-base lg:text-lg">
        Professional healthcare services tailored to your needs
      </p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 lg:py-16">

    <!-- Search Bar -->
    <div class="mb-8 sm:mb-10">
      <div class="relative max-w-md">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
        <input
          [(ngModel)]="search"
          (ngModelChange)="filterServices()"
          (keyup)="filterServices()"
          placeholder="Search services..."
          class="w-full pl-10 pr-4 py-2.5 sm:py-3 border-2 border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:border-blue-600 transition text-sm sm:text-base">
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-16 sm:py-20">
      <div class="text-4xl sm:text-5xl animate-spin inline-block mb-4">⏳</div>
      <p class="text-gray-500 text-sm sm:text-base font-medium">Loading services...</p>
    </div>

    <!-- Services Grid -->
    <div *ngIf="!loading && filteredServices.length > 0"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 lg:gap-8">
      <div *ngFor="let service of filteredServices"
           class="bg-white border-2 border-gray-200 rounded-xl p-5 sm:p-6 lg:p-8 hover:border-blue-600 hover:shadow-xl transition flex flex-col group">

        <!-- Icon -->
        <div class="w-12 h-12 sm:w-14 sm:h-14 bg-blue-50 group-hover:bg-blue-600 rounded-xl flex items-center justify-center text-2xl sm:text-3xl mb-4 transition">
          🏥
        </div>

        <h3 class="text-base sm:text-lg font-bold text-gray-900 mb-2">
          {{ service.name }}
        </h3>

        <p class="text-gray-500 text-xs sm:text-sm mb-4 flex-1 leading-relaxed">
          {{ service.description }}
        </p>

        <!-- Price + Duration -->
        <div class="flex justify-between items-center mb-4 sm:mb-5 py-3 border-t border-b border-gray-100">
          <div>
            <p class="text-xs text-gray-400 font-medium">Price</p>
            <span class="text-lg sm:text-xl font-bold text-blue-600">₱{{ service.price }}</span>
          </div>
          <div class="text-right">
            <p class="text-xs text-gray-400 font-medium">Duration</p>
            <span class="text-base sm:text-lg font-bold text-gray-700">
              {{ service.duration_minutes }}m
            </span>
          </div>
        </div>

        <!-- Book Button -->
        <a [routerLink]="['/book', service.id]"
           class="block text-center bg-blue-600 text-white py-2.5 sm:py-3 rounded-xl hover:bg-blue-700 active:bg-blue-800 transition font-semibold text-sm sm:text-base">
          Book Appointment
        </a>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && filteredServices.length === 0"
         class="text-center py-16 sm:py-20 bg-gray-50 rounded-2xl border-2 border-gray-200">
      <div class="text-5xl sm:text-6xl mb-4">🔍</div>
      <h3 class="text-lg sm:text-xl font-bold text-gray-900 mb-2">No services found</h3>
      <p class="text-gray-500 text-sm sm:text-base mb-6">Try adjusting your search term</p>
      <button (click)="search=''; filterServices()"
              class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
        Clear Search
      </button>
    </div>

  </div>
</div>
