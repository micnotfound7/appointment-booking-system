<div class="min-h-screen bg-gray-50 py-8 sm:py-12 lg:py-16 px-4 sm:px-6">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-gray-900 mb-6 sm:mb-8">
      My Profile
    </h1>

    <!-- Error when no profile -->
    <div *ngIf="error && !profile"
         class="bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ error }}
    </div>

    <!-- Profile Card -->
    <div *ngIf="profile" class="bg-white border-2 border-gray-200 rounded-xl shadow-sm overflow-hidden">

      <!-- Top Banner -->
      <div class="bg-gradient-to-r from-blue-600 to-blue-700 h-20 sm:h-24 lg:h-28"></div>

      <!-- Avatar + Info -->
      <div class="px-4 sm:px-6 lg:px-8 pb-6 sm:pb-8">
        <!-- Avatar with Upload -->
        <div class="flex flex-col sm:flex-row sm:items-end gap-4 -mt-10 sm:-mt-12 mb-6 sm:mb-8">
        <div class="relative w-20 h-20 sm:w-24 sm:h-24 flex-shrink-0">
          <div class="w-full h-full rounded-full bg-white border-4 border-white shadow-md flex items-center justify-center text-4xl sm:text-5xl overflow-hidden">
            <img *ngIf="profile.profile_image"
                 [src]="'http://localhost:3000' + profile.profile_image"
                 class="w-full h-full object-cover rounded-full" alt="Profile">
            <span *ngIf="!profile.profile_image">👤</span>
          </div>
          <!-- Upload Button -->
          <label class="absolute bottom-0 right-0 bg-blue-600 text-white w-7 h-7 rounded-full flex items-center justify-center cursor-pointer hover:bg-blue-700 transition shadow-md text-xs">
            📷
            <input type="file" accept="image/*" (change)="onImageChange($event)" class="hidden">
          </label>
        </div>
        <div class="sm:mb-2">
          <h2 class="text-xl sm:text-2xl font-bold text-gray-900">{{ profile.name }}</h2>
          <p class="text-gray-500 text-sm sm:text-base">{{ profile.email }}</p>
          <span class="inline-block mt-1 bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">
            {{ profile.role | titlecase }}
          </span>
        </div>
      </div>

        <!-- Alerts -->
        <div *ngIf="success"
             class="bg-green-50 border-2 border-green-200 text-green-700 px-4 py-3 rounded-lg mb-5 text-sm flex items-center gap-2">
          ✅ {{ success }}
        </div>
        <div *ngIf="error && profile"
             class="bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-lg mb-5 text-sm">
          {{ error }}
        </div>

        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 sm:space-y-5">

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
              <input formControlName="name" type="text"
                     class="w-full border-2 border-gray-200 text-gray-900 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 focus:outline-none focus:border-blue-600 transition text-sm sm:text-base">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">Phone Number</label>
              <input formControlName="phone" type="tel"
                     placeholder="09XX-XXX-XXXX"
                     class="w-full border-2 border-gray-200 text-gray-900 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 focus:outline-none focus:border-blue-600 transition text-sm sm:text-base">
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
            <input [value]="profile.email" disabled type="email"
                   class="w-full border-2 border-gray-100 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 bg-gray-50 text-gray-400 text-sm sm:text-base cursor-not-allowed">
            <p class="text-xs text-gray-400 mt-1">Email cannot be changed</p>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Location / Address</label>
            <input formControlName="location" type="text"
                   placeholder="City, Province"
                   class="w-full border-2 border-gray-200 text-gray-900 rounded-lg px-3 sm:px-4 py-2.5 sm:py-3 focus:outline-none focus:border-blue-600 transition text-sm sm:text-base">
          </div>

          <!-- Member Since -->
          <div class="bg-gray-50 rounded-lg px-4 py-3 border border-gray-200">
            <p class="text-xs text-gray-500 font-medium">Member Since</p>
            <p class="text-gray-800 font-semibold text-sm sm:text-base mt-0.5">
              {{ profile.created_at | date:'MMMM d, y' }}
            </p>
          </div>

          <button type="submit" [disabled]="loading"
                  class="w-full bg-blue-600 text-white py-3 sm:py-3.5 rounded-lg font-bold hover:bg-blue-700 active:bg-blue-800 transition disabled:opacity-50 disabled:cursor-not-allowed text-sm sm:text-base">
            {{ loading ? 'Saving...' : 'Update Profile' }}
          </button>
        </form>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="!profile && !error"
         class="text-center py-16 bg-white rounded-xl border-2 border-gray-200">
      <div class="text-4xl mb-3 animate-pulse">👤</div>
      <p class="text-gray-500 text-sm sm:text-base">Loading profile...</p>
    </div>
  </div>
</div>
